name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew build sourcesJar javadocJar writeNewPom
    - name: Run tests with Gradle
      run: ./gradlew test
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: alpheus-afp-parser-artifacts
        path: build/libs/
