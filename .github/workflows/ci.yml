name: CI

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v2
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build and Test with Gradle
      run: ./gradlew build sourcesJar javadocJar writeNewPom shadowJar
    - name: Run Fuzz Tests
      run: ./gradlew test --tests AFPFuzzTest
      env:
        JAZZER_FUZZ: 1
    - name: Verify Artifacts
      run: |
        ls build/libs/alpheusafpparser-*.jar | grep -v "sources" | grep -v "javadoc" | xargs test -f
        test -f build/libs/alpheusafpparser-*-sources.jar
        test -f build/libs/alpheusafpparser-*-javadoc.jar
        test -f build/libs/alpheusafpparser-*.pom
        test -f build/libs/alpheus-afp-parser-cli-*.jar
    - name: CLI Smoke Test
      run: |
        CLI_JAR=$(ls build/libs/alpheus-afp-parser-cli-*.jar)
        java -jar $CLI_JAR src/test/resources/afp/minimal.afp - | grep "<AFPDocument"
    - name: Create Latest CLI Artifact
      run: cp build/libs/alpheus-afp-parser-cli-*.jar build/libs/alpheus-afp-parser-cli-latest.jar
    - name: Verify Latest Artifact
      run: test -f build/libs/alpheus-afp-parser-cli-latest.jar
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: alpheus-afp-parser-artifacts
        path: build/libs
    - name: Upload Test Reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: build/reports/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: alpheus-afp-parser-artifacts
        path: artifacts
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        generate_release_notes: true
        fail_on_unmatched_files: true
        files: |
          artifacts/alpheus-afp-parser-cli-*.jar
          artifacts/alpheus-afp-parser-cli-latest.jar
          artifacts/alpheusafpparser-*.jar
          artifacts/alpheusafpparser-*.pom
