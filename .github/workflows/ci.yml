name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: gradle
    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v2
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build and Test with Gradle
      run: ./gradlew build sourcesJar javadocJar writeNewPom
    - name: Verify Artifacts
      run: |
        ls build/libs/alpheusafpparser-*.jar | grep -v "sources" | grep -v "javadoc" | xargs test -f
        test -f build/libs/alpheusafpparser-*-sources.jar
        test -f build/libs/alpheusafpparser-*-javadoc.jar
        test -f build/libs/alpheusafpparser-*.pom
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: alpheus-afp-parser-artifacts
        path: build/libs/
    - name: Upload Reports on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: build/reports/
