name: Trigger Jules

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
      title:
        description: 'Title of the task'
        required: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'jules') ||
      (github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Trigger Jules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULES_TOKEN: ${{ secrets.JULES_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -ex
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
            TITLE="${{ github.event.inputs.title }}"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
            TITLE="${{ github.event.issue.title }}"
          fi

          npm config set @google:registry https://wombat-dressing-room.appspot.com
          npm install -g @google/jules
          jules remote new --repo "$REPOSITORY" --session "Fix Issue $ISSUE_NUMBER: $TITLE"

          gh issue comment "$ISSUE_NUMBER" --repo "$REPOSITORY" --body "Jules has been triggered for this issue. @google-labs-jules[bot] is now processing it."
